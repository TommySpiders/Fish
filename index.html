<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fish Tank</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; background: #015573 url("background1.PNG") center center / cover no-repeat fixed; color: #fff; }

    #gameRoot { position: fixed; inset: 0; overflow: hidden; }
    #tank { position: absolute; inset: 0; overflow: hidden; background: transparent; }
    #fxCanvas { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
    #fishLayer { position: absolute; inset: 0; z-index: 3; }

    .fish {
      position: absolute;
      width: 115px; height: 65px;
      /* Ensure guppy1.PNG is a horizontal strip of frames for this to work! */
      background-image: url("guppy1.PNG");
      background-size: 460px 65px; 
      cursor: pointer;
      transform-origin: center center;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,0.6));
      /* Smooth rotation transition */
      transition: transform 0.1s linear; 
    }

    /* Animation for the tail flap */
    @keyframes tailWag { 0% { background-position: 0px 0px; } 100% { background-position: -460px 0px; } }
    .swimming { animation: tailWag 0.5s steps(4) infinite; }

    /* UI and Info Panel CSS remains identical to your original code */
    .bubbleBtn { position: fixed; width: 44px; height: 44px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ffffff, #cfeeff, #60c7ff); border: 2px solid rgba(255,255,255,0.75); display: flex; align-items: center; justify-content: center; z-index: 10; }
    #feedBtn { left: 12px; top: 25%; } #cleanBtn { left: 12px; top: 45%; }
    #buyBtn { right: 12px; top: 25%; } #shopBtn { right: 12px; top: 45%; }
    #coinBubble { position: fixed; top: 16px; right: 18px; width: 56px; height: 56px; border-radius: 50%; background: radial-gradient(circle, #fff7bf, #ffcc33); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; color: #5a3900; z-index: 11; }
  </style>
</head>
<body>

<div id="gameRoot">
  <div id="tank">
    <canvas id="fxCanvas"></canvas>
    <div id="fishLayer"></div>
  </div>
  <div id="coinBubble">🪙<span id="coinCount">20</span></div>
  <div id="feedBtn" class="bubbleBtn">🍤</div>
  <div id="cleanBtn" class="bubbleBtn">🧽</div>
  <div id="buyBtn" class="bubbleBtn">🐠</div>
  <div id="shopBtn" class="bubbleBtn">🛒</div>
</div>

<script>
const fishList = [];
const tank = document.getElementById("tank");
const fishLayer = document.getElementById("fishLayer");
let tankRect = tank.getBoundingClientRect();

// --- NEW SWIMMING PHYSICS ---
const LERP_FACTOR = 0.015; // Lower is more "lazy/natural"

function createGuppy() {
  const f = {
    x: Math.random() * tankRect.width,
    y: Math.random() * tankRect.height,
    targetX: Math.random() * tankRect.width,
    targetY: Math.random() * tankRect.height,
    el: document.createElement("div")
  };
  f.el.className = "fish swimming";
  fishLayer.appendChild(f.el);
  fishList.push(f);
}

function updateFish() {
  fishList.forEach(f => {
    // 1. Fluid Movement using Lerp
    f.x += (f.targetX - f.x) * LERP_FACTOR;
    f.y += (f.targetY - f.y) * LERP_FACTOR;

    // 2. Randomly change direction
    if (Math.random() < 0.005) {
      f.targetX = Math.random() * tankRect.width;
      f.targetY = Math.random() * tankRect.height;
    }

    // 3. Banking Logic: Rotate based on the path
    const angle = Math.atan2(f.targetY - f.y, f.targetX - f.x) * (180 / Math.PI);
    const scaleX = (f.targetX > f.x) ? 1 : -1;

    // 4. Apply transformations
    f.el.style.left = `${f.x - 57.5}px`;
    f.el.style.top = `${f.y - 32.5}px`;
    f.el.style.transform = `rotate(${angle}deg) scaleY(${scaleX})`;
  });

  requestAnimationFrame(updateFish);
}

// Initialization
for(let i=0; i<3; i++) createGuppy();
updateFish();

// (Keep your existing click listeners and UI functions below this point)
document.getElementById("buyBtn").addEventListener("click", createGuppy);
</script>
</body>
</html>
