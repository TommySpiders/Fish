<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fish Tank</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <style>
    /* --- Your Original Styles --- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; background: #015573; color: #fff; font-family: sans-serif; }
    
    #gameRoot { position: fixed; inset: 0; }
    #tank { position: absolute; inset: 0; background: transparent; }
    #fxCanvas { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
    #fishLayer { position: absolute; inset: 0; z-index: 3; }

    .fish {
      position: absolute;
      width: 115px; height: 65px;
      background-image: url("guppy1.PNG");
      background-size: contain;
      background-repeat: no-repeat;
      transform-origin: center center;
      transition: transform 0.1s linear; /* Smooths the rotation/banking */
      cursor: pointer;
    }

    .bubbleBtn { position: fixed; width: 44px; height: 44px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ffffff, #cfeeff, #60c7ff); border: 2px solid rgba(255,255,255,0.75); display: flex; align-items: center; justify-content: center; z-index: 10; }
    #feedBtn { left: 12px; top: 25%; } #cleanBtn { left: 12px; top: 45%; }
    #buyBtn { right: 12px; top: 25%; } #shopBtn { right: 12px; top: 45%; }
    #coinBubble { position: fixed; top: 16px; right: 18px; width: 56px; height: 56px; border-radius: 50%; background: radial-gradient(circle, #fff7bf, #ffcc33); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; color: #5a3900; z-index: 11; }
  </style>
</head>
<body>

<div id="gameRoot">
  <div id="tank">
    <canvas id="fxCanvas"></canvas>
    <div id="fishLayer"></div>
  </div>
  <div id="coinBubble">🪙<span id="coinCount">20</span></div>
  <div id="feedBtn" class="bubbleBtn">🍤</div>
  <div id="cleanBtn" class="bubbleBtn">🧽</div>
  <div id="buyBtn" class="bubbleBtn">🐠</div>
  <div id="shopBtn" class="bubbleBtn">🛒</div>
</div>

<script>
/* --- SETUP --- */
const fishList = [];
const fishLayer = document.getElementById("fishLayer");
const fxCanvas = document.getElementById("fxCanvas");
const ctx = fxCanvas.getContext("2d");
const LERP = 0.015; // Smoothness factor

function createGuppy(charge = true) {
  const f = {
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    targetX: Math.random() * window.innerWidth,
    targetY: Math.random() * window.innerHeight,
    el: document.createElement("div")
  };
  f.el.className = "fish";
  fishLayer.appendChild(f.el);
  fishList.push(f);
}

/* --- THE NEW MOVEMENT ENGINE --- */
function updateFish() {
  fishList.forEach(f => {
    // Smooth lerp movement
    f.x += (f.targetX - f.x) * LERP;
    f.y += (f.targetY - f.y) * LERP;

    // Change target occasionally
    if (Math.random() < 0.005) {
      f.targetX = Math.random() * window.innerWidth;
      f.targetY = Math.random() * window.innerHeight;
    }

    // Natural Banking: Angle towards target
    const angle = Math.atan2(f.targetY - f.y, f.targetX - f.x) * (180 / Math.PI);
    const scaleX = (f.targetX > f.x) ? 1 : -1;

    // Apply
    f.el.style.left = `${f.x - 57.5}px`;
    f.el.style.top = `${f.y - 32.5}px`;
    f.el.style.transform = `rotate(${angle}deg) scaleY(${scaleX})`;
  });
  
  requestAnimationFrame(updateFish);
}

// Init
for(let i=0; i<3; i++) createGuppy();
updateFish();

// --- YOUR BUTTONS ---
document.getElementById("buyBtn").addEventListener("click", () => createGuppy(true));
</script>
</body>
</html>
