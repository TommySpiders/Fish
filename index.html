<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Fish Tank</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  touch-action:none;
  background:#015573 url("background1.PNG") center/cover no-repeat fixed;
  font-family:sans-serif;
  color:#fff;
}

#gameRoot { position:fixed; inset:0; }

#tank { position:absolute; inset:0; }

#fishLayer { position:absolute; inset:0; }

.fish {
  position:absolute;
  width:115px; height:65px;
  background:url("guppy1.PNG") center/contain no-repeat;
  transform-origin:center;
  filter: drop-shadow(0 6px 8px rgba(0,0,0,0.6));
}

.bubbleBtn {
  position:fixed;
  width:44px; height:44px;
  border-radius:50%;
  background:#6fd3ff;
  display:flex;
  align-items:center;
  justify-content:center;
}

#feedBtn { left:10px; top:30%; }
#buyBtn  { right:10px; top:30%; }

#coinBubble {
  position:fixed;
  top:10px; right:10px;
  background:#ffd54f;
  padding:10px;
  border-radius:20px;
}
</style>
</head>

<body>
<div id="gameRoot">
  <div id="tank">
    <div id="fishLayer"></div>
  </div>

  <div id="coinBubble">🪙 <span id="coinCount">20</span></div>
  <div id="feedBtn" class="bubbleBtn">🍤</div>
  <div id="buyBtn" class="bubbleBtn">🐠</div>
</div>

<script>
const fishLayer = document.getElementById("fishLayer");
const coinEl = document.getElementById("coinCount");

let coins = 20;
const fishList = [];

/* ===== CREATE FISH ===== */
function createFish(charge = true) {
  if (charge && coins < 20) return;

  if (charge) {
    coins -= 20;
    coinEl.textContent = coins;
  }

  const el = document.createElement("div");
  el.className = "fish";
  fishLayer.appendChild(el);

  const f = {
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,

    vx: 0,
    vy: 0,

    targetX: Math.random() * window.innerWidth,
    targetY: Math.random() * window.innerHeight,

    speed: 30 + Math.random() * 20,
    direction: 1,
    el
  };

  fishList.push(f);
}

/* ===== START ===== */
for (let i = 0; i < 3; i++) createFish(false);

/* ===== LOOP ===== */
let last = 0;

function update(t) {
  let dt = (t - last) / 1000;
  last = t;

  if (dt > 0.033) dt = 0.033;

  fishList.forEach(f => {

    if (Math.random() < 0.01) {
      f.targetX = Math.random() * window.innerWidth;
      f.targetY = Math.random() * window.innerHeight;
    }

    const dx = f.targetX - f.x;
    const dy = f.targetY - f.y;

    const dist = Math.sqrt(dx*dx + dy*dy) || 1;

    const dirX = dx / dist;
    const dirY = dy / dist;

    const targetVX = dirX * f.speed;
    const targetVY = dirY * f.speed * 0.6;

    // smooth movement
    f.vx += (targetVX - f.vx) * 2 * dt;
    f.vy += (targetVY - f.vy) * 2 * dt;

    f.x += f.vx * dt;
    f.y += f.vy * dt;

    // bounds
    if (f.x < 50) f.vx += 20;
    if (f.x > window.innerWidth - 50) f.vx -= 20;
    if (f.y < 80) f.vy += 20;
    if (f.y > window.innerHeight - 80) f.vy -= 20;

    // direction
    if (f.vx > 1) f.direction = 1;
    else if (f.vx < -1) f.direction = -1;

    const angle = Math.atan2(f.vy, f.vx) * 180 / Math.PI;

    f.el.style.left = (f.x - 57) + "px";
    f.el.style.top  = (f.y - 32) + "px";
    f.el.style.transform = `scaleX(${f.direction}) rotate(${angle}deg)`;
  });

  requestAnimationFrame(update);
}

requestAnimationFrame(update);

/* ===== BUTTONS ===== */
document.getElementById("buyBtn").onclick = () => createFish(true);

document.getElementById("feedBtn").onclick = () => {
  coins += fishList.length;
  coinEl.textContent = coins;
};
</script>
</body>
</html>
